services:
  rabbit:
    image: rabbitmq:3-management
    container_name: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  event_receiver:
    build:
      # monorepo root: event-schemas is a relative path dependency
      context: ..
      dockerfile: event-receiver/Dockerfile
    restart: always
    env_file: .env
    ports:
      - "${WEB_EXTERNAL_PORT:-8888}:8888"
